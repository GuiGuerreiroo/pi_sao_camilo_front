name: ReactJS CI

on:
  push:
    branches:
      - dev
      
  pull_request:
    branches:
      - dev
    types: [opened, synchronize, reopened]

jobs:
  react_ci:
    name: Run ReactJS CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4 
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install 

      - name: Lint with ESLint
        run: npm run lint

      - name: Build ReactJS app
        run: npm run build